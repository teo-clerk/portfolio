<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/duck-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/duck-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teo Clerici Jurado | AI & Data Science Specialist</title>
    <meta name="description" content="Official portfolio of Teo Clerici Jurado — AI & Data Science student at H-FARM College, Educational Mentor with MIT Edgerton Center, and Lead at Lumina Consulting." />
    <meta name="author" content="Teo Clerici Jurado" />
    <meta name="keywords" content="Teo Clerici Jurado, portfolio, AI, Data Science, AI & Data Science, H-FARM, MIT Edgerton, Lumina Consulting, developer, terminal, interactive" />

    <!-- ═══ PERFORMANCE: Preconnect to Google Fonts CDN ═══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ═══ PERFORMANCE: Preload hero background (LCP element) ═══ -->
    <!-- AVIF for modern browsers (Chrome 85+, Firefox 93+, Safari 16+) -->
    <link rel="preload" as="image" type="image/avif" href="/bg-hero.avif" fetchpriority="high" />
    <!-- WebP fallback preload for slightly older browsers -->
    <link rel="preload" as="image" type="image/webp" href="/bg-hero.webp" />

    <!-- ═══ PERFORMANCE: Load Fira Code font with swap strategy ═══ -->
    <!-- Only load weight 400+700 to minimize download. display=swap ensures text is visible immediately with fallback font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" /></noscript>

    <!-- ═══ PERFORMANCE: Inline critical above-the-fold CSS ═══ -->
    <!-- This lets the browser paint the background + terminal shell before the full CSS bundle arrives -->
    <style>
      :root {
        --bg-color: #0a0a0a;
        --terminal-bg: rgba(20, 20, 20, 0.5);
        --text-color: #FFFFFF;
        --accent-color: #8A2BE2;
        --glass-border: rgba(255, 255, 255, 0.2);
        --font-stack: 'Fira Code', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: var(--bg-color);
        /* LQIP inline — 3KB blurred placeholder loads instantly */
        background-image: url('/bg-hero-lqip.webp');
        background-size: cover;
        background-position: center;
        height: 100vh; height: 100dvh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: var(--font-stack);
        color: var(--text-color);
        overflow: hidden;
        position: relative;
      }
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background: inherit;
        filter: grayscale(100%) contrast(1.1) brightness(0.6);
        z-index: -1;
      }
      #root { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    </style>

    <!-- JSON-LD Structured Data for AEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Teo Clerici Jurado",
      "jobTitle": "AI & Data Science Student and Educational Mentor",
      "affiliation": {
        "@type": "Organization",
        "name": "H-FARM College",
        "url": "https://h-farm.com"
      },
      "url": "https://teoclerici.com",
      "sameAs": [
        "https://www.linkedin.com/in/teo-clerici",
        "https://github.com/teo-clerk"
      ],
      "description": "AI & Data Science student and Educational Mentor with MIT Edgerton Center, passionate about software engineering, data analytics, and educational technology."
    }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://teoclerici.com/" />
    <meta property="og:title" content="Teo Clerici Jurado | AI & Data Science Specialist" />
    <meta property="og:description" content="Official portfolio of Teo Clerici Jurado — AI & Data Science student, Educational Mentor with MIT Edgerton Center, and Lead at Lumina Consulting." />
    <meta property="og:image" content="/bg-hero.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://teoclerici.com/" />
    <meta property="twitter:title" content="Teo Clerici Jurado | AI & Data Science Specialist" />
    <meta property="twitter:description" content="Official portfolio of Teo Clerici Jurado — exploring the intersection of AI, Data Science, and Education." />
    <meta property="twitter:image" content="/bg-hero.jpg" />
  </head>
